services:
  mysql:
    image: mysql:8.0
    container_name: mysql-container-job
    restart: always
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: Praga@060802
      MYSQL_DATABASE: jobportal
      MYSQL_ROOT_HOST: "%"
    ports:
      - "3307:3306"
    volumes:
      - job-data:/var/lib/mysql
    networks:
      - job-network
    healthcheck:
      test: ["CMD","mysqladmin","ping","-h","localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  app:
    build: .
    container_name: job-app
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - job-network

networks:
  job-network:
    driver: bridge

volumes:
  job-data: